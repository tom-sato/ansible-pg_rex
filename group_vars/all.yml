---
s_lan_interface: enp0s8
d_lan_interface: enp0s9
ic_lan_interfaces:
  - enp0s10
  - enp0s16
a_lan_interface: enp0s17
system_locale: ja_JP.UTF-8
system_timezone: Asia/Tokyo
root_device: "{{ ansible_distribution_major_version is version('9', '<=') | ternary('/dev/sda2', '/dev/sda3') }}"
pacemaker_password: hapasswd
pacemaker_cluster_name: pgrex_cluster
postgresql_version: 18
postgresql_password: pgpasswd
postgresql_data_directory: /dbfp/pgdata/data
postgresql_wal_directory: /dbfp/pgwal/pg_wal
postgresql_archive_directory: /dbfp/pgarch/arc1
postgresql_port: 5432
postgresql_replication_user: repuser
postgresql_replication_password: reppasswd
postgresql_replication_address: 192.168.57.111
postgresql_primary_address: 192.168.56.111
postgresql_standby_address: 192.168.56.112
monitored_addresses:
  - "{{ ansible_facts.default_ipv4.gateway }}"
monitored_devices: "{{ ansible_facts.devices.keys() | map('regex_replace', '^', '/dev/') }}"
ipmi_addresses:
  node-1: 172.23.135.101
  node-2: 172.23.135.102
ipmi_user: Administrator
ipmi_password: adminpasswd
pm_extra_tools_download_url: https://github.com/linux-ha-japan/pm_extra_tools/releases/download/pm_extra_tools-1.8/pm_extra_tools-1.8-1.el{{ ansible_distribution_major_version }}.noarch.rpm
pg_rex_tools_download_url: >-
  {%- if ansible_distribution_major_version is version('8', '==') -%}
  https://github.com/ossc-db/PG-REX-tools/releases/download/PG-REX_15_5/pg-rex15-5.0-1.tar.gz
  {%- elif ansible_distribution_major_version is version('9', '==') -%}
  https://github.com/ossc-db/PG-REX-tools/releases/download/PG-REX_17_1/pg-rex17-1.0-1.tar.gz
  {%- elif ansible_distribution_major_version is version('10', '==') -%}
  https://github.com/ossc-db/PG-REX-tools/releases/download/PG-REX_18_1/pg-rex18-1.0-1.tar.gz
  {%- endif -%}
