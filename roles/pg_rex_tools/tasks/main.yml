---
- name: Gathering Package Facts
  package_facts:
- block:
    - name: Gathering Archive Status
      find:
        paths: ./pg-rex
      register: _find
    - block:
        - name: Creating Destination Directory
          file:
            path: ./pg-rex
            state: directory
        - name: Unpacking Archive
          unarchive:
            src: "{{ pg_rex_tools_download_url }}"
            dest: "{{ ansible_env.PWD }}/pg-rex"
            remote_src: true
      when: _find.matched == 0
    - name: Finding PG-REX Operation Tools Packages
      find:
        paths: ./pg-rex
        patterns: "{{ '*.el%s.*.rpm' | format(ansible_distribution_major_version) }}"
        recurse: true
      register: _find
    - name: Installing PG-REX Operation Tools
      yum:
        name: "{{ items | flatten(1) | select() }}"
        enablerepo: "{{ ansible_distribution_major_version is version('10', '>=') | ternary('crb', '') }}"
        disable_gpg_check: true
      vars:
        items:
          - "{{ _find.files | json_query('[*].path') }}"
          - lsof
          - "{{ ansible_distribution_major_version is version('9', '>=') | ternary('perl-File-Compare', '') }}"
          - "{{ ansible_distribution_major_version is version('10', '==') | ternary('https://github.com/ossc-db/PG-REX-tools/releases/download/PG-REX_18_1/Net_OpenSSH-0.62-1.el10.x86_64.rpm', '') }}"
  when: "'pg-rex_operation_tools_script' not in ansible_facts.packages"
- name: Removing Destination Directory
  file:
    path: ./pg-rex
    state: absent
- name: Finding PGRex Perl Module Directory
  find:
    paths: /usr/local/share/perl5
    patterns: PGRex
    recurse: true
    file_type: directory
  register: _find_pgrex
- name: Fixing PGRex English Message Module Syntax
  lineinfile:
    path: "{{ _find_pgrex.files | map(attribute='path') | first }}/Po/en.pm"
    regexp: ^(package PGRex::Po::en)$
    line: \1;
    backrefs: true
- name: Disabling PostgreSQL Version Check in PGRex
  lineinfile:
    path: "{{ _find_pgrex.files | map(attribute='path') | first }}/common.pm"
    regexp: ^(\s+)(if \(int\(\$version_num / 10000\) != \d+)(\){)$
    line: \1#\2\3\n\1\2 && 0\3
    backrefs: true
- name: Removing --no-manifest from pg_basebackup Command
  replace:
    path: /usr/local/bin/pg-rex_standby_start
    regexp: ^(\s+)(.+)(--no-manifest )(.+)$
    replace: \1#\2\3\4\n\1\2\4
  when: postgresql_version is version('12', '<=')
- name: Excluding Summaries Directory from Archive Check
  replace:
    path: /usr/local/bin/pg-rex_standby_start
    regexp: ^(\s+if \(grep { .+ && \$_ ne 'archive_status') (} readdir \$dir\) {)$
    replace: \1 && $_ ne 'summaries' \2
  when: postgresql_version is version('17', '>=')
- name: Configuring PG-REX Operation Tools
  lineinfile:
    path: /etc/pg-rex_tools.conf
    regex: ^({{ item.0 }}) = (?:[^ ,]+(?:\s*,\s*[^ ,]+)*)?(\s+#.*)$
    line: \1 = {{ item.1 }}\2
    backrefs: true
  loop:
    - - D_LAN_IPAddress
      - "{{ hostvars | json_query('*.ansible_%s.ipv4.address' | format(d_lan_interface)) | join(',') }}"
    - - IC_LAN_IPAddress
      - >-
        {%- for item in ic_lan_interfaces -%}
        {{ '(%s)' | format(hostvars | json_query('*.ansible_%s.ipv4.address' | format(item)) | join(',')) }}
        {%- if item != ic_lan_interfaces[-1] -%},{%- endif -%}
        {%- endfor -%}
    - - Archive_dir
      - "{{ postgresql_archive_directory }}"
    - - PGPATH
      - /usr/pgsql-{{ postgresql_version }}/bin
    - - PEER_NODE_SSH_PASS_MODE
      - nopass
    - - BACKUP_NODE_SSH_PASS_MODE
      - nopass
    - - HACLUSTER_NAME
      - "{{ pacemaker_cluster_name }}"
- name: Gathering SSH Host Keys
  command:
    cmd: ssh-keyscan -t ed25519 {{ hostvars[item]['ansible_' + d_lan_interface].ipv4.address }}
  loop: "{{ groups.all | difference([ansible_hostname]) }}"
  register: _ssh_keygen
  changed_when: false
- name: Creating SSH Directory
  file:
    path: /root/.ssh
    state: directory
- name: Adding SSH Host Keys to Known Hosts File
  known_hosts:
    path: /root/.ssh/known_hosts
    name: "{{ item.cmd.3 }}"
    key: "{{ item.stdout_lines[-1] }}"
  loop: "{{ _ssh_keygen.results }}"
- name: Creating SSH Key Pair
  openssh_keypair:
    path: /root/.ssh/id_rsa
  register: _openssh_keypair
- name: Adding SSH Key to Authorized Keys File
  authorized_key:
    user: root
    key: "{{ _openssh_keypair.public_key }}"
  delegate_to: "{{ item }}"
  loop: "{{ groups.all | difference([ansible_hostname]) }}"
